name: Sync X Articles

on:
  schedule:
    # Every 2 hours (UTC)
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-x-articles
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync X Articles (Twikit)
        env:
          TWITTER_COOKIE_JSON: ${{ secrets.TWITTER_COOKIE_JSON }}
          X_USERNAME: Simonsterrific
        run: python scripts/sync-x-articles.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts/ .x-sync/ assets/x-articles/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync X Articles from @Simonsterrific"
            git push
          fi
