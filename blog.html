<title>Writing | Shi Zhang</title>

<style>
:root {
  --bg: oklch(10% 0.012 55);
  --fg: oklch(95% 0.008 80);
  --fg-dim: oklch(55% 0.006 80);
  --accent: oklch(72% 0.20 45);
  --accent-dim: oklch(72% 0.20 45 / 0.12);
  --border: oklch(50% 0 0 / 0.11);
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  overflow-x: hidden;
  cursor: none;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  pointer-events: none; z-index: 9999; opacity: 0.35;
}
#cursor { position: fixed; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); pointer-events: none; z-index: 10000; transform: translate(-50%,-50%); mix-blend-mode: difference; }
#cursor-ring { position: fixed; width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--fg-dim); pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: width 0.3s, height 0.3s, border-color 0.3s; }
body:has(a:hover) #cursor-ring, body:has(button:hover) #cursor-ring { width: 64px; height: 64px; border-color: var(--accent); }
#progress { position: fixed; top: 0; left: 0; height: 2px; background: var(--accent); z-index: 1000; transition: width 0.1s linear; }
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 28px 48px; mix-blend-mode: difference; }
.nav-logo { font-family: var(--font-display); font-size: 22px; letter-spacing: 0.05em; color: var(--fg); text-decoration: none; }
.nav-links { display: flex; gap: 24px; list-style: none; }
.nav-links a { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--fg); text-decoration: none; opacity: 0.6; transition: opacity 0.2s; position: relative; }
.nav-links a::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 1px; background: var(--accent); transition: width 0.3s; }
.nav-links a:hover, .nav-links a.active { opacity: 1; }
.nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
section { padding: 120px 48px; }
#blog { border-top: 1px solid var(--border); min-height: 100vh; padding-top: 140px; }
.blog-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 64px; gap: 24px; flex-wrap: wrap; }
.blog-header-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.blog-title { font-family: var(--font-display); font-size: clamp(48px, 6vw, 96px); line-height: 1; }
.blog-lede { font-size: 12px; letter-spacing: 0.08em; color: var(--fg-dim); margin-top: 16px; max-width: 520px; line-height: 1.8; }
.blog-new-btn { display: inline-flex; align-items: center; gap: 10px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--fg); border: 1px solid var(--border); padding: 12px 24px; background: transparent; cursor: none; transition: border-color 0.3s, background 0.3s; font-family: var(--font-body); text-decoration: none; }
.blog-new-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
.blog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; align-items: stretch; }
.blog-card { display: flex; flex-direction: column; height: 100%; padding: 36px 32px; background: oklch(12% 0.01 55); cursor: none; transition: background 0.3s; position: relative; overflow: hidden; }
.blog-card::before { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform 0.4s cubic-bezier(0.16,1,0.3,1); }
.blog-card:hover { background: oklch(14% 0.012 55); }
.blog-card:hover::before { transform: scaleX(1); }
.blog-card-date { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
.blog-card-title { font-family: var(--font-display); font-size: 26px; line-height: 1.1; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.blog-card-excerpt { font-size: 12px; line-height: 1.8; color: var(--fg-dim); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
.blog-card-tags { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
.blog-card-tags:empty { display: none; margin: 0; }
.blog-card-tag { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; border: 1px solid var(--border); padding: 3px 10px; border-radius: 2px; color: var(--fg-dim); }
.blog-card-read { margin-top: auto; padding-top: 20px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
.blog-empty { grid-column: 1/-1; padding: 80px; text-align: center; color: var(--fg-dim); font-size: 13px; }
#blog-reader { position: fixed; inset: 0; z-index: 4000; background: var(--bg); overflow-y: auto; display: none; padding: 80px 24px 120px; }
#blog-reader.open { display: block; }
.reader-inner { max-width: 740px; width: 100%; margin: 0 auto; }
.reader-back { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--fg-dim); background: none; border: none; cursor: none; transition: color 0.2s; font-family: var(--font-body); margin-bottom: 60px; }
.reader-back:hover { color: var(--fg); }
.reader-title { font-family: var(--font-display); font-size: clamp(40px, 6vw, 88px); line-height: 0.95; width: 100%; margin: 0 auto 24px; text-align: center; }
.reader-meta { font-size: 11px; letter-spacing: 0.12em; color: var(--fg-dim); margin-bottom: 60px; border-bottom: 1px solid var(--border); padding-bottom: 24px; text-align: center; }
.reader-body { width: 100%; font-size: 14px; line-height: 2; color: oklch(80% 0.01 80); }
.reader-body h1, .reader-body h2, .reader-body h3 { font-family: var(--font-display); color: var(--fg); margin-top: 2em; margin-bottom: 1em; line-height: 1.2; letter-spacing: 0.05em; }
.reader-body h1 { font-size: 40px; }
.reader-body h2 { font-size: 32px; }
.reader-body h3 { font-size: 24px; }
.reader-body p { margin-bottom: 1.5em; transition: background-color 0.3s ease, color 0.3s ease; padding: 12px 16px; margin-left: -16px; margin-right: -16px; border-radius: 8px; }
.reader-body p:hover { background-color: oklch(14% 0.012 55); color: var(--fg); }
.reader-body pre { background: oklch(10% 0.012 55); padding: 20px; border-radius: 8px; overflow-x: auto; margin-bottom: 1.5em; border: 1px solid var(--border); }
.reader-body code { font-family: var(--font-body); font-size: 13px; color: var(--accent); background: oklch(14% 0.012 55); padding: 2px 6px; border-radius: 4px; }
.reader-body pre code { background: transparent; padding: 0; }
.reader-body blockquote { border-left: 2px solid var(--accent); padding-left: 20px; margin: 2em 0; color: var(--fg); font-style: italic; }
.reader-body img { max-width: 100%; border-radius: 8px; margin: 2em 0; }
.reader-body ul, .reader-body ol { margin-left: 20px; margin-bottom: 1.5em; }
.reader-body li { margin-bottom: 0.5em; }
.reader-body a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
.reader-body a:hover { border-color: var(--accent); }
@media (max-width: 600px) {
  #blog-reader { padding: 72px 16px 96px; }
  .reader-title { font-size: clamp(32px, 9vw, 56px); }
}
footer { border-top: 1px solid var(--border); padding: 24px 48px; display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 0.1em; color: var(--fg-dim); }
.reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.7s cubic-bezier(0.16,1,0.3,1), transform 0.7s cubic-bezier(0.16,1,0.3,1); }
.reveal.visible { opacity: 1; transform: translateY(0); }
@media (max-width: 900px) {
  nav { padding: 20px 24px; }
  section { padding: 100px 24px; }
  #blog { padding-top: 120px; }
  .blog-grid { grid-template-columns: 1fr; }
  .nav-links { gap: 16px; }
}
</style>

<body>

<div id="progress"></div>
<div id="cursor"></div>
<div id="cursor-ring"></div>

<nav>
  <a href="index.html" class="nav-logo">SZ</a>
  <ul class="nav-links">
    <li><a href="index.html#about">About</a></li>
    <li><a href="index.html#skills">Skills</a></li>
    <li><a href="index.html#work">Work</a></li>
    <li><a href="index.html#resume">Resume</a></li>
    <li><a href="blog.html" class="active">Blog</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
</nav>

<section id="blog">
  <div class="blog-header">
    <div>
      <h1 class="blog-title reveal">Writing</h1>
      <p class="blog-lede reveal" id="blog-lede">All essays, notes, and articles.</p>
    </div>
    <div class="blog-header-actions">
      <a href="index.html#blog" class="blog-new-btn reveal">← Back Home</a>
    </div>
  </div>
  <div class="blog-grid" id="blog-grid"></div>
</section>

<div id="blog-reader">
  <div class="reader-inner">
    <button class="reader-back" id="reader-back">← Back to writing</button>
    <div class="reader-title" id="reader-title"></div>
    <div class="reader-meta" id="reader-meta"></div>
    <div class="reader-body" id="reader-body"></div>
  </div>
</div>

<footer>
  <span>© 2026 Shi Zhang (Simon)</span>
  <span>Engineering · Design · Intelligence</span>
</footer>

<script>
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cursor.style.left = mx+'px'; cursor.style.top = my+'px'; });
(function animRing() { rx += (mx-rx)*0.12; ry += (my-ry)*0.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(animRing); })();

window.addEventListener('scroll', () => {
  document.getElementById('progress').style.width = (window.scrollY/(document.body.scrollHeight-window.innerHeight)*100)+'%';
});

const io = new IntersectionObserver(entries => entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }), { threshold: 0.15 });
document.querySelectorAll('.reveal').forEach(el => io.observe(el));
window.__blogRevealObserver = io;

BlogApp.initReader({ backPath: 'blog.html' });
BlogApp.loadBlogList({
  limit: null,
  viewAllId: null,
  readerBasePath: 'blog.html',
  onPostsLoaded(total) {
    const lede = document.getElementById('blog-lede');
    if (lede && total) lede.textContent = `${total} post${total === 1 ? '' : 's'} — essays, notes, and articles.`;
  },
});
</script>
</body>
